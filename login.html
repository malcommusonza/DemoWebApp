<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Demo Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">DemoApp</a>
            <a href="index.html" class="login-btn">Back to Home</a>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Login</h1>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
        <p id="message" style="margin-top: 20px; color: #0277bd;"></p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simple demo validation
            if (email && password) {
                document.getElementById('message').textContent = 'Login successful! Welcome back.';
                document.getElementById('message').style.color = '#4caf50';
                document.getElementById('loginForm').reset();
            }
        });
    </script>
</body>
</html>
